<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Libo Reader</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #161a22;
      --text: #e8edf3;
      --muted: #9aa7b3;
      --accent: #f3c05f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background: var(--bg);
      color: var(--text);
    }
    .wrap {
      max-width: 900px;
      margin: 24px auto;
      padding: 0 16px 30px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .back {
      color: var(--accent);
      text-decoration: none;
      font-family: Arial, sans-serif;
      font-size: 14px;
    }
    .status {
      color: var(--muted);
      font-family: Arial, sans-serif;
      font-size: 13px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid #2a3342;
      border-radius: 12px;
      padding: 20px;
    }
    h1 {
      margin: 0 0 16px;
      font-size: 30px;
      line-height: 1.2;
    }
    #readerContent p {
      line-height: 1.85;
      font-size: 18px;
      margin: 0 0 14px;
    }

    .reader-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
    }
    .spinner {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 3px solid rgba(243, 192, 95, 0.25);
      border-top-color: rgba(243, 192, 95, 0.95);
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .reader-loading p {
      margin: 0;
      color: var(--muted);
      font-family: Arial, sans-serif;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="topbar">
      <a class="back" href="libo-library.html">← Back to Library</a>
      <span id="readerStatus" class="status">Loading...</span>
    </div>
    <section class="panel">
      <h1 id="readerTitle">Reader</h1>
      <div id="readerContent">
        <div class="reader-loading">
          <div class="spinner"></div>
          <p>Loading book content...</p>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
